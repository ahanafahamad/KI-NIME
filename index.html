                      been mesmerized by her father Tooru's rakugo performances.
                      Peeking in behind a sliding door, she would spend hours
                      watching and mimicking his work. For Tooru, the only thing
                      separating him from that coveted rank is a promotion test
                      in front of an audience and a senior rakugo master, Isshou
                      Arakawa. Despite his passionate performance, Tooru finds
                      himself expelled from the rakugo school following the
                      exam. This makes him give up on rakugo entirely and settle
                      for a regular job, breaking his daughter's heart. Filled
                      with grief and anger, Akane now seeks vengeance on the man
                      who refuses to see the genius behind her father's rakugo
                      style. She begs Tooru's former rakugo master, Shiguma
                      Arakawa, to take her under his wing. But Shiguma feels
                      unworthy of taking on another pupil after what happened to
                      her father six years prior. In order to see if she has
                      what it takes to enter the rakugo world, Shiguma urges
                      Akane to test her resolve by performing in front of an
                      audience. [Written by MAL Rewrite]

                      Asa has been locked away in a cage, ordered to perform a
                      special duty that prohibits her from meeting more than a
                      few select individuals. On an otherwise inconspicuous day,
                      a group of armed men riding in helicopters, referred to as
                      "dragons" by the citizens, assaults the village in search

                      last-ditch effort, Dera makes Yuru give a gift to the
